<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DjangoBlog</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/">DjangoBlog</a>
    <div class="ms-auto d-flex gap-2 align-items-center">
      <form class="d-flex" action="/search/" method="GET">
        <input class="form-control me-2" type="search" name="q" placeholder="Search posts...">
        <button class="btn btn-outline-light" type="submit">Search</button>
      </form>
      {% if user.is_authenticated %}
        <span class="text-light">Hi, {{ user.username }}</span>
        <a href="/post/create/" class="btn btn-success">+ New Post</a>
        <a href="/logout/"      class="btn btn-outline-light">Logout</a>
      {% else %}
        <a href="/login/"    class="btn btn-outline-light">Login</a>
        <a href="/register/" class="btn btn-light">Register</a>
      {% endif %}
    </div>
  </div>
</nav>

<div class="container mt-4 mb-5">
  {% block content %}{% endblock %}
</div>

<footer class="bg-dark text-light text-center py-3 mt-5">
  <small>DjangoBlog &copy; 2024 — Built with Django + DRF</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
